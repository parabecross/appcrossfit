# CI: lint + build en todo push/PR; check-isolation solo en push y PRs del mismo repo.
# El job check-box-isolation usa SUPABASE_SERVICE_ROLE_KEY contra la BD real — no corre
# en PRs desde forks externos, donde GitHub no expone secrets del repo base de forma segura.

name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # Build no requiere Supabase real; placeholders evitan fallos si algún módulo lee env en compile time.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  check-box-isolation:
    needs: lint-and-build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 20 lacks native WebSocket; scripts use ws transport (see scripts/lib/supabase-script-client.ts)
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing GitHub Actions secret: NEXT_PUBLIC_SUPABASE_URL"
            missing=1
          fi
          if [ -z "$SUPABASE_ANON" ]; then
            echo "::error::Missing GitHub Actions secret: NEXT_PUBLIC_SUPABASE_ANON_KEY"
            missing=1
          fi
          if [ -z "$SUPABASE_SERVICE" ]; then
            echo "::error::Missing GitHub Actions secret: SUPABASE_SERVICE_ROLE_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure los 3 secrets en Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Write .env.local for check-isolation
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          } > .env.local

      - name: Run box isolation check
        run: npm run check-isolation
