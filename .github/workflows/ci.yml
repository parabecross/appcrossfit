# CI: lint + build en todo push/PR.
# check-box-isolation SOLO corre si configuras secrets de una BD de prueba dedicada
# (SUPABASE_ISOLATION_TEST_*). Nunca uses la URL de producción — ese job creaba
# Test Box A / Test Box B en cada push a main.

name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # Build no requiere Supabase real; placeholders evitan fallos si algún módulo lee env en compile time.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  check-box-isolation:
    needs: lint-and-build
    if: >-
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository)
      ) &&
      secrets.SUPABASE_ISOLATION_TEST_URL != '' &&
      secrets.SUPABASE_ISOLATION_TEST_ANON_KEY != '' &&
      secrets.SUPABASE_ISOLATION_TEST_SERVICE_ROLE_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 20 lacks native WebSocket; scripts use ws transport (see scripts/lib/supabase-script-client.ts)
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local for check-isolation (BD de prueba, no producción)
        run: |
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_ISOLATION_TEST_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ISOLATION_TEST_ANON_KEY }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_ISOLATION_TEST_SERVICE_ROLE_KEY }}"
          } > .env.local

      - name: Run box isolation check
        run: npm run check-isolation
